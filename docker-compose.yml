services:
  db:
    image: postgres:15-alpine
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  app:
    build: .
    env_file: .env
    depends_on:
      - db
      - redis
    ports:
      - "8080:8080"

  worker:
    build: .
    command: celery -A app.core.celery worker --loglevel=info
    env_file: .env
    depends_on:
      - redis
      - db
volumes:
  postgres_data:
  redis_data:

